run:
  id: R107
  name: pytorch_one_step_training
  milestone: P5
  experiment_block: P5.1
  seed: 23
data:
  dataset_id: DS1_V1
  dataset_path: data/ds1_v1
  schema_version: v0
  split_id: ds1_v1_scaffold
  train_filter: train
  val_filter: validation
  test_filter: test
model:
  system_name: final_single_pytorch_small_train
  student_config: E2_T1_F1_S1_M0_V2_U0_pytorch_cuda_v0
  baseline_config: null
training:
  optimizer: adamw
  learning_rate: 0.0001
  batch_size: 8
  rollout_horizon: 1
  max_steps: 60
  early_stopping_metric: torch_one_step_training_loss_ratio
  early_stopping_patience: 0
evaluation:
  horizons: [1-step]
  metrics: [torch_one_step_training_passed, torch_one_step_training_val_mse]
  report_splits: [train, validation]
logging:
  output_dir: runs/R107_pytorch_one_step_training
  save_checkpoints: true
  save_diagnostics: true
teacher_config: configs/teacher/ds1_v1.yaml
dataset_source: existing
artifact_dataset_subdir: ds1
primary_metric: torch_one_step_training_passed
torch_training:
  name: pytorch_one_step_training
  mode: one_step_train
  seed: 23
  split_role: train
  val_split_role: validation
  history_len: 8
  batch_size: 8
  max_episodes: 8
  max_samples: 96
  max_val_samples: 64
  sample_stride: 2
  max_steps: 60
  eval_interval: 20
  learning_rate: 0.0001
  weight_decay: 0.0
  grad_clip: 1.0
  success_loss_ratio: 0.995
  checkpoint_name: model.pt
  device: cuda
  require_cuda: true
  model_config: {hidden_dim: 32, history_len: 8}
