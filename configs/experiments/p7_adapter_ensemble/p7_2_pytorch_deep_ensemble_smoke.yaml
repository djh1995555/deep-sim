dataset_source: existing
artifact_dataset_subdir: ds1
primary_metric: torch_ensemble_training_passed
torch_training:
  name: pytorch_deep_ensemble_smoke
  mode: ensemble_train
  seed: 23
  ensemble_k: 3
  split_role: train
  val_split_role: validation
  history_len: 8
