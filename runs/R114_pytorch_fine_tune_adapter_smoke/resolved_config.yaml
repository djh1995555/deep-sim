run:
  id: R114
  name: pytorch_fine_tune_adapter_smoke
  milestone: P7
  experiment_block: P7.1
  seed: 23
data:
  dataset_id: DS1_PROXY_FT_V1
  dataset_path: data/ds1_proxy_ft_v1
  schema_version: v0
  split_id: ds1_proxy_ft_v1_scaffold
  train_filter: fine-tune
  val_filter: test-window
  test_filter: test-window
model:
  system_name: pytorch_fine_tune_adapter_matrix_smoke
  student_config: FT0_FT6_adapter_trainability_v0
  baseline_config: R111_base_checkpoint
training:
  optimizer: adamw
  learning_rate: 0.0001
  batch_size: 4
  rollout_horizon: 1
  max_steps: 8
  early_stopping_metric: torch_fine_tune_smoke_passed
  early_stopping_patience: 0
evaluation:
  horizons:
  - 1-step
  metrics:
  - torch_fine_tune_smoke_passed
  - torch_fine_tune_mode_count
  report_splits:
  - fine-tune
  - test-window
logging:
  output_dir: runs/R114_pytorch_fine_tune_adapter_smoke
  save_checkpoints: true
  save_diagnostics: true
teacher_config: configs/teacher/ds1_proxy_ft_v1.yaml
dataset_source: existing
artifact_dataset_subdir: ds1_proxy_ft
primary_metric: torch_fine_tune_smoke_passed
torch_training:
  name: pytorch_fine_tune_adapter_smoke
  mode: fine_tune_smoke
  seed: 23
  split_role: fine-tune
  val_split_role: test-window
  target_window_role: target_train
  val_target_window_role: target_test
  history_len: 8
  batch_size: 4
  max_episodes: 12
  max_samples: 24
  max_val_samples: 24
  sample_stride: 2
  max_steps: 8
  eval_interval: 8
  learning_rate: 0.0001
  weight_decay: 0.0
  grad_clip: 1.0
  success_loss_ratio: 1.25
  loss_mode: normalized_mse
  checkpoint_name: fine_tune_smoke.pt
  resume_from: runs/R111_pytorch_base_model_small_training/checkpoints/base_model_small.pt
  device: cuda
  require_cuda: true
  model_config:
    hidden_dim: 64
    history_len: 8
    encoder_type: tcn
    tire_mode: T1
    fz_mode: F1
    steering_mode: S1
    mu_mode: M1a
    vehicle_mode: V1
  fine_tune_modes:
  - FT0
  - FT1
  - FT2
  - FT3
  - FT4
  - FT5
  - FT6
  fine_tune_buckets_grid:
  - - FTD1
  - - FTD1
    - FTD2
    - FTD3
