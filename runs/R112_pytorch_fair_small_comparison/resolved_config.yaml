run:
  id: R112
  name: pytorch_fair_small_comparison
  milestone: P6
  experiment_block: P6.2
  seed: 23
data:
  dataset_id: DS1_V1
  dataset_path: data/ds1_v1
  schema_version: v0
  split_id: ds1_v1_scaffold
  train_filter: train
  val_filter: validation
  test_filter: test
model:
  system_name: fair_small_hybrid_vs_black_box
  student_config: matched_budget_pytorch_cuda_v0
  baseline_config: direct_tcn_direct_gru_direct_nbeats
training:
  optimizer: adamw
  learning_rate: 0.0001
  batch_size: 8
  rollout_horizon: 16
  max_steps: 40
  early_stopping_metric: torch_fair_compare_passed
  early_stopping_patience: 0
evaluation:
  horizons:
  - 1-step
  - 16-step
  metrics:
  - torch_fair_compare_passed
  - torch_fair_compare_hybrid_vs_best_black_box_mse_ratio
  report_splits:
  - train
  - validation
logging:
  output_dir: runs/R112_pytorch_fair_small_comparison
  save_checkpoints: true
  save_diagnostics: true
teacher_config: configs/teacher/ds1_v1.yaml
dataset_source: existing
artifact_dataset_subdir: ds1
primary_metric: torch_fair_compare_passed
torch_training:
  name: pytorch_fair_small_comparison
  mode: fair_compare
  seed: 23
  split_role: train
  val_split_role: validation
  rollout_split_role: validation
  history_len: 8
  batch_size: 8
  max_episodes: 8
  max_samples: 96
  max_val_samples: 64
  sample_stride: 2
  max_steps: 40
  eval_interval: 20
  rollout_steps: 16
  rollout_max_episodes: 4
  learning_rate: 0.0001
  weight_decay: 0.0
  grad_clip: 1.0
  success_loss_ratio: 1.05
  loss_mode: normalized_mse
  max_rollout_rmse: 1000000.0
  max_constraint_violation_rate: 0.0
  device: cuda
  require_cuda: true
  variants:
  - name: hybrid
    model_type: hybrid
    model_config:
      hidden_dim: 64
      history_len: 8
      encoder_type: tcn
      tire_mode: T1
      fz_mode: F1
      steering_mode: S1
      mu_mode: M1a
      vehicle_mode: V1
  - name: direct_tcn
    model_type: direct_tcn
    baseline_config:
      hidden_dim: 64
      context_dim: 17
      history_len: 8
      direct_residual_bound: 0.6
  - name: direct_gru
    model_type: direct_gru
    baseline_config:
      hidden_dim: 64
      context_dim: 17
      history_len: 8
      direct_residual_bound: 0.6
  - name: direct_nbeats
    model_type: direct_nbeats
    baseline_config:
      hidden_dim: 64
      context_dim: 17
      history_len: 8
      direct_residual_bound: 0.6
